    content: '';
    position: fixed;

    z-index: 0;
  }

  /* ── Header ── */

    z-index: 1;
    text-align: center;
    padding: 20px 0 16px;
    width: 100%;
    max-width: 520px;
  }
  .logo {
    display: block;
    width: 100%;
    max-width: 400px;
    height: auto;
    margin: 0 auto 6px;
  }

  @media (prefers-color-scheme: dark) {
    .logo-light { display: none; }
    .logo-dark { display: block; }

  :root[data-theme="dark"] .logo-light { display: none; }
  :root[data-theme="dark"] .logo-dark { display: block; }
  :root[data-theme="light"] .logo-light { display: block; }
  :root[data-theme="light"] .logo-dark { display: none; }

    font-size: clamp(11px, 2.5vw, 13px);
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ── Book container ── */
  .book-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
  }
  .book {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── Strip cards ── */
  .strip {
    position: relative;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    z-index: 1;
    perspective: 800px;
  }

  .strip-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 76px;
    padding: 16px 20px 16px 14px;
    border-radius: 10px;
    box-shadow: var(--card-shadow);
    transition: box-shadow 0.18s, transform 0.18s;
    transform-style: preserve-3d;
    overflow: hidden;
  }

  /* Paper grain on each card */
  .strip-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(165deg, rgba(255,255,255,0.18) 0%, transparent 40%, rgba(0,0,0,0.04) 100%);
    pointer-events: none;
    z-index: 1;
  }


  @media (hover: hover) {
    .strip:hover .strip-card {
      box-shadow: var(--card-shadow-hover);
      transform: translateX(4px) scale(1.008);
    }
  }
  .strip:active .strip-card {
    transform: translateX(6px) scale(0.995);
    box-shadow: var(--card-shadow);
  }

  /* ── Text ── */
  .strip-text {
    position: relative;
    z-index: 2;
    color: #1c1108;
    line-height: 1.15;
    transition: opacity 0.12s;
  }

  .strip.display-type .strip-text {
    font-weight: 900;
    font-size: clamp(17px, 5vw, 30px);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .strip.action-type .strip-text {
    font-style: italic;
    font-weight: 400;
    font-size: clamp(14px, 3.8vw, 22px);
    letter-spacing: 0.02em;
  }

  /* ── Unflipped placeholder ── */
  .strip.unflipped .strip-text {
    opacity: 0;
  }
  .strip.unflipped .strip-card {
    position: relative;
  }
  .strip-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.15s;
  }
  .strip:not(.unflipped) .strip-placeholder {
    opacity: 0;
  }
  .strip-placeholder-label {
    font-size: clamp(10px, 2.5vw, 12px);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 700;
    color: #1c1108;
    opacity: 0.3;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .strip-placeholder-label .tap-icon {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid currentColor;
    border-radius: 50%;
    position: relative;
    opacity: 0.6;
  }
  .strip-placeholder-label .tap-icon::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 4px; height: 4px;
    background: currentColor;
    border-radius: 50%;
    transform: translate(-50%,-50%);
  }
  .strip.unflipped .strip-placeholder-label {
    animation: softPulse 2.5s ease-in-out infinite;
  }
  @keyframes softPulse {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.45; }
  }

  /* ── Flip animation ── */
  .strip.flipping .strip-card {
    animation: flipIn 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes flipIn {
    0% { transform: rotateX(0deg); }
    45% { transform: rotateX(92deg) scale(0.95); }
    100% { transform: rotateX(0deg); }
  }

  /* ── Insult readout ── */
  .readout {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    margin-top: 20px;
    min-height: 48px;
  }
  .readout-inner {
    background: var(--bg-deep);
    border: 1.5px dashed var(--gutter);

    padding: 16px 20px;
    text-align: center;
    transition: border-color 0.3s, background 0.3s;
  }
  .readout.complete .readout-inner {
    border-style: solid;
    border-color: var(--ink);
    background: var(--glow);

  .readout-text {

    line-height: 1.5;
    font-style: italic;

    font-weight: 600;
    font-style: normal;

  .readout-empty {

    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

    z-index: 1;
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;

    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    border: 2px solid var(--ink);
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
  }
  .btn-solid {

  @media (hover: hover) {

  .btn svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Footer ── */
  .footer {
    position: relative;
    z-index: 1;
    margin-top: 20px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.04em;

  /* ── Responsive ── */
  @media (max-height: 700px) {
    .header { padding: 16px 0 12px; }
    .strip-card { min-height: 62px; padding: 12px 16px 12px 10px; }
    .book { gap: 4px; }
    .readout { margin-top: 12px; }
    .readout-inner { padding: 10px 16px; }
    .actions { margin-top: 10px; }
    body { padding-top: 0; }

  @media (max-height: 580px) {

    .logo { max-width: 280px; }
.strip-card { min-height: 52px; padding: 8px 14px 8px 8px; }

  }

  @media (prefers-reduced-motion: reduce) {
    .strip.flipping .strip-card { animation: none; }

  /* ── Copy feedback ── */

    bottom: 80px;
    left: 50%;

    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

const CATS = ['persons','actions','adjNouns','connectors','creatures'];
const TYPES = ['display-type','action-type','display-type','action-type','display-type'];

const book = document.getElementById('book');
const readout = document.getElementById('readout');
const readoutText = document.getElementById('readoutText');
const readoutEmpty = document.getElementById('readoutEmpty');
const copyBtn = document.getElementById('copyBtn');
const copyToast = document.getElementById('copyToast');

const strips = [];
const state = CATS.map(() => ({ flipped: false, value: null, lastIndex: -1, colorIndex: -1 }));

function pick(arr, lastIdx) {
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (i === lastIdx && arr.length > 1);
  return { value: arr[i], index: i };
}

function pickColor(lastCI) {
  let i;
  do { i = Math.floor(Math.random() * COLORS.length); } while (i === lastCI);
  return { color: COLORS[i], index: i };
}

function haptic() {
  if (navigator.vibrate) navigator.vibrate(12);
}

function buildStrips() {
  CATS.forEach((cat, i) => {
    const el = document.createElement('div');
    const c = pickColor(-1);
    state[i].colorIndex = c.index;
    el.className = `strip unflipped ${TYPES[i]}`;
    el.innerHTML = `
      <div class="strip-card" style="background:${c.color}">
        <span class="strip-text"></span>
        <div class="strip-placeholder">
          <span class="strip-placeholder-label">
            <span class="tap-icon"></span>${PLACEHOLDER_LABELS[i]}
          </span>
        </div>
      </div>`;
    el.addEventListener('click', () => flip(i));
    book.appendChild(el);
    strips.push(el);
  });
}

function flip(i, skipHaptic) {
  const el = strips[i];
  const card = el.querySelector('.strip-card');
  const text = el.querySelector('.strip-text');
  if (!skipHaptic) haptic();
  el.classList.add('flipping');

  setTimeout(() => {
    const { value, index } = pick(DATA[CATS[i]], state[i].lastIndex);
    const { color, index: ci } = pickColor(state[i].colorIndex);
    state[i].flipped = true;
    state[i].value = value;
    state[i].lastIndex = index;
    state[i].colorIndex = ci;
    el.classList.remove('unflipped');
    card.style.background = color;
    text.textContent = value;
    updateReadout();
  }, 140);

  setTimeout(() => el.classList.remove('flipping'), 320);
}

function updateReadout() {
  const allFlipped = state.every(s => s.flipped);
  const anyFlipped = state.some(s => s.flipped);

  if (!anyFlipped) {
    readoutEmpty.style.display = '';
    readoutText.style.display = 'none';
    copyBtn.style.display = 'none';
    readout.classList.remove('complete');
    return;
  }

  const parts = state.map((s, i) => s.flipped ? s.value : '___');
  const sentence = parts.join(' ');

  readoutEmpty.style.display = 'none';
  readoutText.style.display = '';
  readoutText.textContent = allFlipped ? sentence : sentence;
  copyBtn.style.display = allFlipped ? '' : 'none';
  readout.classList.toggle('complete', allFlipped);
}

function shuffleAll() {
  haptic();
  strips.forEach((_, i) => {
    setTimeout(() => flip(i, true), i * 80);
  });
}

function resetAll() {
  haptic();
  strips.forEach((el, i) => {
    el.classList.add('flipping');
    setTimeout(() => {
      const { color, index: ci } = pickColor(state[i].colorIndex);
      state[i] = { flipped: false, value: null, lastIndex: -1, colorIndex: ci };
      el.classList.add('unflipped');
      el.querySelector('.strip-text').textContent = '';
      el.querySelector('.strip-card').style.background = color;
      updateReadout();
    }, 140);
    setTimeout(() => el.classList.remove('flipping'), 320);
  });
}

function copyInsult() {
  const sentence = state.map(s => s.value).join(' ');
  navigator.clipboard.writeText(sentence).then(() => {
    copyToast.classList.add('show');
    setTimeout(() => copyToast.classList.remove('show'), 1800);
  });
}

document.getElementById('shuffleBtn').addEventListener('click', shuffleAll);
document.getElementById('resetBtn').addEventListener('click', resetAll);
copyBtn.addEventListener('click', copyInsult);

buildStrips();
</script>
