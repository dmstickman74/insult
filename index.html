<meta charset="utf-8">
<title>Poppy's Ultimate Insult Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c1108">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #f7f2e8;
    --bg-deep: #ede6d6;
    --ink: #1c1108;
    --ink-soft: #3d2e1a;
    --muted: #9a8b76;
    --gutter: #bfb49e;
    --glow: rgba(255,200,60,0.12);
    --card-shadow: 0 2px 6px rgba(28,17,8,0.18), 0 0 0 1px rgba(28,17,8,0.06);
    --card-shadow-hover: 0 4px 16px rgba(28,17,8,0.22), 0 0 0 1px rgba(28,17,8,0.1);
    --accent: #E84855;
    --accent-green: #C8D23C;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1108;
      --bg-deep: #140c04;
      --ink: #f0e8d8;
      --ink-soft: #c8b89a;
      --muted: #7a6b56;
      --gutter: #3a2e20;
      --glow: rgba(255,200,60,0.06);
      --card-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      --card-shadow-hover: 0 6px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
    }
  }
  :root[data-theme="dark"] {
    --bg: #1c1108;
    --bg-deep: #140c04;
    --ink: #f0e8d8;
    --ink-soft: #c8b89a;
    --muted: #7a6b56;
    --gutter: #3a2e20;
    --glow: rgba(255,200,60,0.06);
    --card-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    --card-shadow-hover: 0 6px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
  }
  :root[data-theme="light"] {
    --bg: #f7f2e8;
    --bg-deep: #ede6d6;
    --ink: #1c1108;
    --ink-soft: #3d2e1a;
    --muted: #9a8b76;
    --gutter: #bfb49e;
    --glow: rgba(255,200,60,0.12);
    --card-shadow: 0 2px 6px rgba(28,17,8,0.18), 0 0 0 1px rgba(28,17,8,0.06);
    --card-shadow-hover: 0 4px 16px rgba(28,17,8,0.22), 0 0 0 1px rgba(28,17,8,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow-x: hidden; -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 24px;
    padding-bottom: max(24px, env(safe-area-inset-bottom, 24px));
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(128,100,60,0.02) 3px, rgba(128,100,60,0.02) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 5px, rgba(128,100,60,0.015) 5px, rgba(128,100,60,0.015) 6px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  .header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 20px 0 16px;
    width: 100%;
    max-width: 520px;
  }
  .logo {
    display: block;
    width: 100%;
    max-width: 400px;
    height: auto;
    margin: 0 auto 6px;
  }
  .logo-dark { display: none; }
  @media (prefers-color-scheme: dark) {
    .logo-light { display: none; }
    .logo-dark { display: block; }
  }
  :root[data-theme="dark"] .logo-light { display: none; }
  :root[data-theme="dark"] .logo-dark { display: block; }
  :root[data-theme="light"] .logo-light { display: block; }
  :root[data-theme="light"] .logo-dark { display: none; }
  .tagline {
    font-size: clamp(11px, 2.5vw, 13px);
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .active-packs-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    padding: 3px 10px;
    border-radius: 12px;
    background: var(--bg-deep);
    transition: background 0.15s;
  }
  .active-packs-indicator:hover { background: var(--gutter); }
  .pack-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  /* ── Book container ── */
  .book-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
  }
  .book {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── Strip cards ── */
  .strip {
    position: relative;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    z-index: 1;
    perspective: 800px;
  }

  .strip-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 76px;
    padding: 16px 20px 16px 14px;
    border-radius: 10px;
    box-shadow: var(--card-shadow);
    transition: box-shadow 0.18s, transform 0.18s;
    transform-style: preserve-3d;
    overflow: hidden;
  }

  .strip-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(165deg, rgba(255,255,255,0.18) 0%, transparent 40%, rgba(0,0,0,0.04) 100%);
    pointer-events: none;
    z-index: 1;
  }

  @media (hover: hover) {
    .strip:hover .strip-card {
      box-shadow: var(--card-shadow-hover);
      transform: translateX(4px) scale(1.008);
    }
  }
  .strip:active .strip-card {
    transform: translateX(6px) scale(0.995);
    box-shadow: var(--card-shadow);
  }

  .strip-text {
    position: relative;
    z-index: 2;
    color: #1c1108;
    line-height: 1.15;
    transition: opacity 0.12s;
  }

  .strip.display-type .strip-text {
    font-weight: 900;
    font-size: clamp(17px, 5vw, 30px);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .strip.action-type .strip-text {
    font-style: italic;
    font-weight: 400;
    font-size: clamp(14px, 3.8vw, 22px);
    letter-spacing: 0.02em;
  }

  .strip.unflipped .strip-text { opacity: 0; }
  .strip.unflipped .strip-card { position: relative; }
  .strip-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.15s;
  }
  .strip:not(.unflipped) .strip-placeholder { opacity: 0; }
  .strip-placeholder-label {
    font-size: clamp(10px, 2.5vw, 12px);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 700;
    color: #1c1108;
    opacity: 0.3;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .strip-placeholder-label .tap-icon {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid currentColor;
    border-radius: 50%;
    position: relative;
    opacity: 0.6;
  }
  .strip-placeholder-label .tap-icon::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 4px; height: 4px;
    background: currentColor;
    border-radius: 50%;
    transform: translate(-50%,-50%);
  }
  .strip.unflipped .strip-placeholder-label {
    animation: softPulse 2.5s ease-in-out infinite;
  }
  @keyframes softPulse {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.45; }
  }

  .strip.flipping .strip-card {
    animation: flipIn 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes flipIn {
    0% { transform: rotateX(0deg); }
    45% { transform: rotateX(92deg) scale(0.95); }
    100% { transform: rotateX(0deg); }
  }

  /* ── Insult readout ── */
  .readout {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    margin-top: 20px;
    min-height: 48px;
  }
  .readout-inner {
    background: var(--bg-deep);
    border: 1.5px dashed var(--gutter);
    border-radius: 8px;
    padding: 16px 20px;
    text-align: center;
    transition: border-color 0.3s, background 0.3s;
  }
  .readout.complete .readout-inner {
    border-style: solid;
    border-color: var(--ink);
    background: var(--glow);
  }
  .readout-text {
    font-size: clamp(14px, 3.5vw, 18px);
    color: var(--ink-soft);
    line-height: 1.5;
    font-style: italic;
    transition: color 0.3s;
  }
  .readout.complete .readout-text {
    color: var(--ink);
    font-weight: 600;
    font-style: normal;
  }
  .readout-empty {
    font-size: clamp(11px, 2.5vw, 13px);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* ── Buttons ── */
  .actions {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 10px 22px;
    border-radius: 4px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    border: 2px solid var(--ink);
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
  }
  .btn-solid {
    background: var(--ink);
    color: var(--bg);
  }
  .btn-accent {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  @media (hover: hover) {
    .btn-ghost:hover { background: var(--ink); color: var(--bg); }
    .btn-solid:hover { opacity: 0.85; }
    .btn-accent:hover { opacity: 0.85; }
  }
  .btn:active { transform: scale(0.96); }

  .btn svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Footer ── */
  .footer {
    position: relative;
    z-index: 1;
    margin-top: 20px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* ── Responsive ── */
  @media (max-height: 700px) {
    .header { padding: 16px 0 12px; }
    .strip-card { min-height: 62px; padding: 12px 16px 12px 10px; }
    .book { gap: 4px; }
    .readout { margin-top: 12px; }
    .readout-inner { padding: 10px 16px; }
    .actions { margin-top: 10px; }
    body { padding-top: 0; }
  }
  @media (max-height: 580px) {
    .header { padding: 8px 0 6px; }
    .logo { max-width: 280px; }
    .strip-card { min-height: 52px; padding: 8px 14px 8px 8px; }
    .book { gap: 3px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .strip.flipping .strip-card { animation: none; }
    .strip.unflipped .strip-placeholder-label { animation: none; opacity: 0.3; }
    .strip-card { transition: none; }
  }

  /* ── Toast ── */
  .copy-toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--bg);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Store Modal ── */
  .store-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .store-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .store-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 85vh;
    max-height: 85dvh;
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .store-overlay.open + .store-panel,
  .store-panel.open {
    transform: translateY(0);
  }
  .store-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--gutter);
    flex-shrink: 0;
  }
  .store-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .store-close {
    width: 36px;
    height: 36px;
    border: none;
    background: var(--bg-deep);
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .store-close:hover { background: var(--gutter); }
  .store-body {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 20px 40px;
    flex: 1;
  }
  .store-section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 20px 0 10px;
  }
  .store-section-title:first-child { margin-top: 4px; }

  /* Pack cards */
  .pack-card {
    background: var(--bg-deep);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--card-shadow);
    transition: box-shadow 0.15s;
  }
  .pack-card:hover { box-shadow: var(--card-shadow-hover); }
  .pack-emoji {
    font-size: 36px;
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border-radius: 12px;
  }
  .pack-info {
    flex: 1;
    min-width: 0;
  }
  .pack-name {
    font-size: 15px;
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .pack-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.3;
  }
  .pack-count {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .pack-action {
    flex-shrink: 0;
  }
  .pack-btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pack-btn-buy {
    background: var(--accent);
    color: #fff;
  }
  .pack-btn-buy:hover { opacity: 0.85; }
  .pack-btn-active {
    background: var(--accent-green);
    color: #1c1108;
  }
  .pack-btn-inactive {
    background: var(--gutter);
    color: var(--ink-soft);
  }
  .pack-btn-inactive:hover { background: var(--accent-green); color: #1c1108; }
  .pack-btn-free {
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    padding: 8px 10px;
    cursor: default;
  }
  .pack-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-kids { background: #5BC0EB; color: #1c1108; }
  .badge-adult { background: #E85D8A; color: #fff; }
  .badge-new { background: var(--accent-green); color: #1c1108; }

  /* ── Bundle banner ── */
  .bundle-banner {
    background: linear-gradient(135deg, var(--accent) 0%, #E85D8A 100%);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    color: #fff;
    text-align: center;
  }
  .bundle-title {
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .bundle-price {
    font-size: 13px;
    margin: 4px 0 8px;
    opacity: 0.9;
  }
  .bundle-price s { opacity: 0.6; }
  .bundle-btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 20px;
    border: 2px solid #fff;
    background: transparent;
    color: #fff;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .bundle-btn:hover { background: #fff; color: var(--accent); }
</style>

<div class="actions">
  <button class="btn btn-solid" id="shuffleBtn">
    <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>

  </button>
  <button class="btn btn-ghost" id="resetBtn">
    <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>

// ═══════════════════════════════════════════
//  PACK STATE MANAGEMENT
// ═══════════════════════════════════════════

function getOwnedPacks() {
  try { return JSON.parse(localStorage.getItem('ownedPacks') || '["original"]'); }
  catch { return ['original']; }
}

function getActivePacks() {
  try { return JSON.parse(localStorage.getItem('activePacks') || '["original"]'); }
  catch { return ['original']; }
}

function saveOwnedPacks(ids) { localStorage.setItem('ownedPacks', JSON.stringify(ids)); }
function saveActivePacks(ids) { localStorage.setItem('activePacks', JSON.stringify(ids)); }

function purchasePack(packId) {
  const owned = getOwnedPacks();
  if (!owned.includes(packId)) {
    owned.push(packId);
    saveOwnedPacks(owned);
  }
  const active = getActivePacks();
  if (!active.includes(packId)) {
    active.push(packId);
    saveActivePacks(active);
  }
  rebuildActiveData();
  renderStore();
  updatePackIndicator();
}

function togglePack(packId) {
  const active = getActivePacks();
  const idx = active.indexOf(packId);
  if (idx >= 0) {
    if (active.length <= 1) return;
    active.splice(idx, 1);
  } else {
    active.push(packId);
  }
  saveActivePacks(active);
  rebuildActiveData();
  renderStore();
  updatePackIndicator();
}

function purchaseBundle(bundleId) {
  const bundle = BUNDLES.find(b => b.id === bundleId);
  if (!bundle) return;
  bundle.packIds.forEach(pid => {
    const owned = getOwnedPacks();
    if (!owned.includes(pid)) {
      owned.push(pid);
      saveOwnedPacks(owned);
    }
    const active = getActivePacks();
    if (!active.includes(pid)) {
      active.push(pid);
      saveActivePacks(active);
    }
  });
  rebuildActiveData();
  renderStore();
  updatePackIndicator();
}

// ═══════════════════════════════════════════
//  ACTIVE DATA (merged from active packs)
// ═══════════════════════════════════════════

let DATA = { persons: [], actions: [], adjNouns: [], connectors: [], creatures: [] };

function rebuildActiveData() {
  const active = getActivePacks();
  DATA = { persons: [], actions: [], adjNouns: [], connectors: [], creatures: [] };
  PACKS.forEach(pack => {
    if (active.includes(pack.id)) {
      CATS.forEach(cat => {
        if (pack[cat] && pack[cat].length) {
          DATA[cat] = DATA[cat].concat(pack[cat]);
        }
      });
    }
  });
  updateTagline();
}

function updateTagline() {
  const counts = CATS.map(c => DATA[c].length);
  const total = counts.reduce((a, b) => a * b, 1);
  let label;
  if (total >= 1e9) label = (total / 1e9).toFixed(1).replace(/\.0$/, '') + ' billion';
  else if (total >= 1e6) label = (total / 1e6).toFixed(0) + ' million';
  else label = total.toLocaleString();
  document.getElementById('tagline').textContent = 'Over ' + label + ' hilarious zingers & stingers';
}

function updatePackIndicator() {
  const active = getActivePacks();
  const el = document.getElementById('packIndicator');
  const dots = active.map(id => {
    const pack = PACKS.find(p => p.id === id);
    if (!pack) return '';
    const colors = { free: '#C8D23C', kids: '#5BC0EB', adult: '#E85D8A' };
    return '<span class="pack-dot" style="background:' + (colors[pack.tier] || '#999') + '" title="' + pack.name + '"></span>';
  }).join('');
  el.innerHTML = dots + ' <span>' + active.length + ' pack' + (active.length !== 1 ? 's' : '') + ' active</span>';
}

// ═══════════════════════════════════════════
//  STORE UI
// ═══════════════════════════════════════════

function openStore() {
  renderStore();
  document.getElementById('storeOverlay').classList.add('open');
  document.getElementById('storePanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeStore() {
  document.getElementById('storeOverlay').classList.remove('open');
  document.getElementById('storePanel').classList.remove('open');
  document.body.style.overflow = '';
}

function renderStore() {
  const owned = getOwnedPacks();
  const active = getActivePacks();
  const body = document.getElementById('storeBody');

  const allOwned = BUNDLES.every(b => b.packIds.every(pid => owned.includes(pid)));

  let html = '';

  // Bundles
  if (!allOwned) {
    BUNDLES.forEach(bundle => {
      const bundleOwned = bundle.packIds.every(pid => owned.includes(pid));
      if (bundleOwned) return;
      html += '<div class="bundle-banner">';
      html += '<div class="bundle-title">' + bundle.name + '</div>';
      html += '<div class="bundle-price"><s>' + bundle.fullPrice + '</s> &rarr; ' + bundle.price + '</div>';
      html += '<button class="bundle-btn" onclick="purchaseBundle(\'' + bundle.id + '\')">';
      html += 'Unlock All</button></div>';
    });
  }

  // Free pack
  html += '<div class="store-section-title">Included Free</div>';
  PACKS.filter(p => p.tier === 'free').forEach(pack => {
    html += renderPackCard(pack, owned, active);
  });

  // Kid packs
  const kidPacks = PACKS.filter(p => p.tier === 'kids');
  if (kidPacks.length) {
    html += '<div class="store-section-title">Kid Packs <span class="pack-badge badge-kids">Ages 6+</span></div>';
    kidPacks.forEach(pack => { html += renderPackCard(pack, owned, active); });
  }

  // Adult packs
  const adultPacks = PACKS.filter(p => p.tier === 'adult');
  if (adultPacks.length) {
    html += '<div class="store-section-title">Adult Packs <span class="pack-badge badge-adult">18+</span></div>';
    adultPacks.forEach(pack => { html += renderPackCard(pack, owned, active); });
  }

  body.innerHTML = html;
}

function renderPackCard(pack, owned, active) {
  const isOwned = owned.includes(pack.id);
  const isActive = active.includes(pack.id);
  const isFree = pack.tier === 'free';
  const count = CATS.reduce((sum, c) => sum + (pack[c] ? pack[c].length : 0), 0);
  const isEmpty = count === 0;

  let btnHtml;
  if (isFree && owned.length <= 1) {
    btnHtml = '<span class="pack-btn pack-btn-free">Included</span>';
  } else if (isFree && isActive) {
    btnHtml = '<button class="pack-btn pack-btn-active" onclick="event.stopPropagation();togglePack(\'' + pack.id + '\')">Active</button>';
  } else if (isFree) {
    btnHtml = '<button class="pack-btn pack-btn-inactive" onclick="event.stopPropagation();togglePack(\'' + pack.id + '\')">Off</button>';
  } else if (!isOwned) {
    if (isEmpty) {
      btnHtml = '<span class="pack-btn pack-btn-free">Coming Soon</span>';
    } else {
      btnHtml = '<button class="pack-btn pack-btn-buy" onclick="event.stopPropagation();purchasePack(\'' + pack.id + '\')">' + pack.price + '</button>';
    }
  } else if (isActive) {
    btnHtml = '<button class="pack-btn pack-btn-active" onclick="event.stopPropagation();togglePack(\'' + pack.id + '\')">Active</button>';
  } else {
    btnHtml = '<button class="pack-btn pack-btn-inactive" onclick="event.stopPropagation();togglePack(\'' + pack.id + '\')">Off</button>';
  }

  let badge = '';
  if (pack.tier === 'kids') badge = '<span class="pack-badge badge-kids">Kids</span>';
  else if (pack.tier === 'adult') badge = '<span class="pack-badge badge-adult">18+</span>';

  return '<div class="pack-card">' +
    '<div class="pack-emoji">' + pack.emoji + '</div>' +
    '<div class="pack-info">' +
      '<div class="pack-name">' + pack.name + badge + '</div>' +
      '<div class="pack-desc">' + pack.description + '</div>' +
      (count > 0 ? '<div class="pack-count">' + count + ' entries</div>' : '') +
    '</div>' +
    '<div class="pack-action">' + btnHtml + '</div>' +
  '</div>';
}

// ═══════════════════════════════════════════
//  GAME ENGINE
// ═══════════════════════════════════════════

const book = document.getElementById('book');
const readout = document.getElementById('readout');
const readoutText = document.getElementById('readoutText');
const readoutEmpty = document.getElementById('readoutEmpty');
const copyBtn = document.getElementById('copyBtn');
const copyToast = document.getElementById('copyToast');

const strips = [];
const state = CATS.map(() => ({ flipped: false, value: null, lastIndex: -1, colorIndex: -1 }));

function pick(arr, lastIdx) {
  if (!arr.length) return { value: '???', index: -1 };
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (i === lastIdx && arr.length > 1);
  return { value: arr[i], index: i };
}

function pickColor(lastCI) {
  let i;
  do { i = Math.floor(Math.random() * COLORS.length); } while (i === lastCI);
  return { color: COLORS[i], index: i };
}

function haptic() {
  if (navigator.vibrate) navigator.vibrate(12);
}

function buildStrips() {
  CATS.forEach((cat, i) => {
    const el = document.createElement('div');
    const c = pickColor(-1);
    state[i].colorIndex = c.index;
    el.className = 'strip unflipped ' + TYPES[i];
    el.innerHTML =
      '<div class="strip-card" style="background:' + c.color + '">' +
        '<span class="strip-text"></span>' +
        '<div class="strip-placeholder">' +
          '<span class="strip-placeholder-label">' +
            '<span class="tap-icon"></span>' + PLACEHOLDER_LABELS[i] +
          '</span>' +
        '</div>' +
      '</div>';
    el.addEventListener('click', function() { flip(i); });
    book.appendChild(el);
    strips.push(el);
  });
}

function flip(i, skipHaptic) {
  const el = strips[i];
  const card = el.querySelector('.strip-card');
  const text = el.querySelector('.strip-text');
  if (!skipHaptic) haptic();
  el.classList.add('flipping');

  setTimeout(function() {
    var r = pick(DATA[CATS[i]], state[i].lastIndex);
    var c = pickColor(state[i].colorIndex);
    state[i].flipped = true;
    state[i].value = r.value;
    state[i].lastIndex = r.index;
    state[i].colorIndex = c.index;
    el.classList.remove('unflipped');
    card.style.background = c.color;
    text.textContent = r.value;
    updateReadout();
  }, 140);

  setTimeout(function() { el.classList.remove('flipping'); }, 320);
}

function updateReadout() {
  const allFlipped = state.every(function(s) { return s.flipped; });
  const anyFlipped = state.some(function(s) { return s.flipped; });

  if (!anyFlipped) {
    readoutEmpty.style.display = '';
    readoutText.style.display = 'none';
    copyBtn.style.display = 'none';
    readout.classList.remove('complete');
    return;
  }

  const parts = state.map(function(s) { return s.flipped ? s.value : '___'; });
  const sentence = parts.join(' ');

  readoutEmpty.style.display = 'none';
  readoutText.style.display = '';
  readoutText.textContent = sentence;
  copyBtn.style.display = allFlipped ? '' : 'none';
  readout.classList.toggle('complete', allFlipped);
}

function shuffleAll() {
  haptic();
  strips.forEach(function(_, i) {
    setTimeout(function() { flip(i, true); }, i * 80);
  });
}

function resetAll() {
  haptic();
  strips.forEach(function(el, i) {
    el.classList.add('flipping');
    setTimeout(function() {
      var c = pickColor(state[i].colorIndex);
      state[i] = { flipped: false, value: null, lastIndex: -1, colorIndex: c.index };
      el.classList.add('unflipped');
      el.querySelector('.strip-text').textContent = '';
      el.querySelector('.strip-card').style.background = c.color;
      updateReadout();
    }, 140);
    setTimeout(function() { el.classList.remove('flipping'); }, 320);
  });
}

function copyInsult() {
  var sentence = state.map(function(s) { return s.value; }).join(' ');
  navigator.clipboard.writeText(sentence).then(function() {
    copyToast.classList.add('show');
    setTimeout(function() { copyToast.classList.remove('show'); }, 1800);
  });
}

document.getElementById('shuffleBtn').addEventListener('click', shuffleAll);
