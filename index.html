  /* Paper grain on each card */

    content: '';

    inset: 0;
    border-radius: inherit;

  .strip.unflipped .strip-text {

  }
  .strip.unflipped .strip-card {
    position: relative;
  }
  .strip-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    pointer-events: none;
    opacity: 1;

<script>

const PLACEHOLDER_LABELS = ['Tap for a person','Tap for an action','Tap for a thing','Tap for a twist','Tap for a creature'];

const DATA = {

  ],
  adjNouns: [

    "a soggy biscuit","a hairy armpit","a flatulent hippo",

  connectors: [

    "Guy Fieri","the Kraken","a passive-aggressive owl",
    "Scooby-Doo","three raccoons in a trenchcoat",
    "Nicolas Cage","Peppa Pig","a very old wizard",
    "Danny DeVito","an army of squirrels","Jar Jar Binks",
    "Medusa","a philosophical octopus","the Grinch",
    "Vladimir Putin's horse","a tap-dancing crab",
    "Dwayne 'The Rock' Johnson","Pikachu",
    "an extremely buff hamster","Queen Elizabeth's corgis",
    "Gordon Ramsay","a horde of angry chihuahuas"
  ]
};

const CATS = ['persons','actions','adjNouns','connectors','creatures'];
const TYPES = ['display-type','action-type','display-type','action-type','display-type'];

const book = document.getElementById('book');
const readout = document.getElementById('readout');
const readoutText = document.getElementById('readoutText');
const readoutEmpty = document.getElementById('readoutEmpty');
const copyBtn = document.getElementById('copyBtn');
const copyToast = document.getElementById('copyToast');

const strips = [];
const state = CATS.map(() => ({ flipped: false, value: null, lastIndex: -1, colorIndex: -1 }));

function pick(arr, lastIdx) {
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (i === lastIdx && arr.length > 1);
  return { value: arr[i], index: i };
}

function pickColor(lastCI) {
  let i;
  do { i = Math.floor(Math.random() * COLORS.length); } while (i === lastCI);
  return { color: COLORS[i], index: i };
}

function haptic() {
  if (navigator.vibrate) navigator.vibrate(12);
}

function buildStrips() {
  CATS.forEach((cat, i) => {
    const el = document.createElement('div');
    const c = pickColor(-1);
    state[i].colorIndex = c.index;
    el.className = `strip unflipped ${TYPES[i]}`;
    el.innerHTML = `
      <div class="strip-card" style="background:${c.color}">
        <span class="strip-text"></span>
        <div class="strip-placeholder">
          <span class="strip-placeholder-label">
            <span class="tap-icon"></span>${PLACEHOLDER_LABELS[i]}
          </span>
        </div>
      </div>`;
    el.addEventListener('click', () => flip(i));
    book.appendChild(el);
    strips.push(el);
  });
}

function flip(i, skipHaptic) {
  const el = strips[i];
  const card = el.querySelector('.strip-card');
  const text = el.querySelector('.strip-text');
  if (!skipHaptic) haptic();
  el.classList.add('flipping');

  setTimeout(() => {
    const { value, index } = pick(DATA[CATS[i]], state[i].lastIndex);
    const { color, index: ci } = pickColor(state[i].colorIndex);
    state[i].flipped = true;
    state[i].value = value;
    state[i].lastIndex = index;
    state[i].colorIndex = ci;
    el.classList.remove('unflipped');
    card.style.background = color;
    text.textContent = value;
    updateReadout();
  }, 140);

  setTimeout(() => el.classList.remove('flipping'), 320);
}

function updateReadout() {
  const allFlipped = state.every(s => s.flipped);
  const anyFlipped = state.some(s => s.flipped);

  if (!anyFlipped) {
    readoutEmpty.style.display = '';
    readoutText.style.display = 'none';
    copyBtn.style.display = 'none';
    readout.classList.remove('complete');
    return;
  }

  const parts = state.map((s, i) => s.flipped ? s.value : '___');
  const sentence = parts.join(' ');

  readoutEmpty.style.display = 'none';
  readoutText.style.display = '';
  readoutText.textContent = allFlipped ? sentence : sentence;
  copyBtn.style.display = allFlipped ? '' : 'none';
  readout.classList.toggle('complete', allFlipped);
}

function shuffleAll() {
  haptic();
  strips.forEach((_, i) => {
    setTimeout(() => flip(i, true), i * 80);
  });
}

function resetAll() {
  haptic();
  strips.forEach((el, i) => {
    el.classList.add('flipping');
    setTimeout(() => {
      const { color, index: ci } = pickColor(state[i].colorIndex);
      state[i] = { flipped: false, value: null, lastIndex: -1, colorIndex: ci };
      el.classList.add('unflipped');
      el.querySelector('.strip-text').textContent = '';
      el.querySelector('.strip-card').style.background = color;
      updateReadout();
    }, 140);
    setTimeout(() => el.classList.remove('flipping'), 320);
  });
}

function copyInsult() {
  const sentence = state.map(s => s.value).join(' ');
  navigator.clipboard.writeText(sentence).then(() => {
    copyToast.classList.add('show');
    setTimeout(() => copyToast.classList.remove('show'), 1800);
  });
}

document.getElementById('shuffleBtn').addEventListener('click', shuffleAll);
document.getElementById('resetBtn').addEventListener('click', resetAll);
copyBtn.addEventListener('click', copyInsult);

buildStrips();
</script>
