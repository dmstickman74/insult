<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="roundedBg">
      <rect width="1024" height="1024" rx="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#E84855"/>

  <!-- Roulette segments (clipped to rounded rect) -->
  <g clip-path="url(#roundedBg)">
    <g transform="translate(512, 512)">
      <path d="M0,-512 A512,512 0 0,1 443.4,256 L0,0 Z" fill="#D63E4A"/>
      <path d="M-443.4,256 A512,512 0 0,1 0,-512 L0,0 Z" fill="#C83545"/>
      <path d="M443.4,256 A512,512 0 0,1 -443.4,256 L0,0 Z" fill="#E84855"/>

      <line x1="0" y1="0" x2="0" y2="-512" stroke="rgba(255,255,255,0.12)" stroke-width="6"/>
      <line x1="0" y1="0" x2="443.4" y2="256" stroke="rgba(255,255,255,0.12)" stroke-width="6"/>
      <line x1="0" y1="0" x2="-443.4" y2="256" stroke="rgba(255,255,255,0.12)" stroke-width="6"/>
    </g>
  </g>

  <!-- Inner dark circle -->
  <circle cx="512" cy="512" r="320" fill="#1c1108"/>
  <circle cx="512" cy="512" r="320" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>

  <!-- Flame -->
  <g transform="translate(512, 540)">
    <path d="M0,-280 C-30,-220 -150,-120 -138,30 C-128,110 -86,170 0,215 C86,170 128,110 138,30 C150,-120 30,-220 0,-280Z" fill="#F5A623"/>
    <path d="M0,-195 C-22,-150 -95,-70 -86,25 C-78,78 -52,120 0,150 C52,120 78,78 86,25 C95,-70 22,-150 0,-195Z" fill="#E8772E"/>
    <path d="M0,-120 C-16,-85 -52,-30 -48,25 C-44,60 -26,88 0,105 C26,88 44,60 48,25 C52,-30 16,-85 0,-120Z" fill="#E84855"/>
    <path d="M0,-65 C-10,-42 -30,-12 -27,18 C-24,38 -14,55 0,65 C14,55 24,38 27,18 C30,-12 10,-42 0,-65Z" fill="#FFD93D"/>
  </g>
</svg>